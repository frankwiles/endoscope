services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      ENDO_S3_ENDPOINT: http://rustfs:9000
      ENDO_S3_ACCESS_KEY: rustfsadmin
      ENDO_S3_SECRET_KEY: rustfsadmin
      ENDO_S3_BUCKET: endoscope
      ENDO_API_KEY: local-dev-api-key
      ENDO_RELOAD: true
      ENDO_PRETTY_JSON_LOGS: true
    volumes:
      - ./endoscope:/app/endoscope
    depends_on:
      rustfs:
        condition: service_healthy
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
      RUSTFS_VOLUMES: /data/rustfs{0..3}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: "true"
    volumes:
      - ./storage:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  init-bucket:
    image: amazon/aws-cli:latest
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: rustfsadmin
      AWS_SECRET_ACCESS_KEY: rustfsadmin
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: >
      /bin/sh -c "
        aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket endoscope 2>/dev/null ||
        aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket endoscope
      "
